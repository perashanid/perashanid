<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanid's Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            padding: 40px 20px;
            color: #c9d1d9;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }

        .category {
            margin-bottom: 60px;
        }

        .category-title {
            color: #c9d1d9;
            font-size: 1.5rem;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px 20px;
        }

        .project-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-title {
            color: #8b949e;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .project-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            flex: 1;
        }

        .project-card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.1);
        }

        .project-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .repo-icon {
            color: #8b949e;
            font-size: 1rem;
        }

        .project-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #58a6ff;
        }

        .project-description {
            color: #8b949e;
            line-height: 1.5;
            margin-bottom: 16px;
            font-size: 0.9rem;
            min-height: 40px;
        }

        .project-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .language {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #c9d1d9;
        }

        .language-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .stat-icon {
            font-size: 1rem;
        }

        .loading {
            text-align: center;
            color: #8b949e;
            font-size: 1.2rem;
            padding: 50px;
        }

        .spinner {
            border: 3px solid #30363d;
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Featured Projects</h1>
        <p class="subtitle">Check out my diverse portfolio including full-stack applications, AI/ML projects, dashboards, and more on <a href="https://github.com/perashanid" style="color: #58a6ff; text-decoration: none;">GitHub</a>.</p>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            Loading projects from GitHub...
        </div>
        
        <div id="projects-container"></div>
    </div>

    <script>
        const projects = {
            fullstack: [
                { repo: 'survease_v2', name: 'Survease V2', title: 'Survey Platform' },
                { repo: 'BookVerse', name: 'BookVerse', title: 'Book Marketplace' },
                { repo: 'Stoxly', name: 'Stoxly', title: 'Stock Trading Platform' },
                { repo: 'Camply', name: 'Camply', title: 'Campaign Builder' },
                { repo: 'ShopSphere', name: 'ShopSphere', title: 'E-Commerce Platform' }
            ],
            ai: [
                { repo: 'Media-bias', name: 'Media Bias Detection', title: 'Media Bias Detector' },
                { repo: 'diabetes_prediction_with_tensordflow', name: 'Diabetes Prediction', title: 'Health Prediction AI' },
                { repo: 'face_recogniation_attendence', name: 'Face Recognition Attendance', title: 'Attendance System' },
                { repo: 'ai-blog', name: 'AI Blog', title: 'AI Content Platform' }
            ],
            dashboards: [
                { repo: 'admin-analytics-dashboard', name: 'Admin Analytics Dashboard', title: 'Analytics Dashboard' },
                { repo: 'algotrade', name: 'AlgoTrade', title: 'Trading Dashboard' },
                { repo: 'financial-application', name: 'Financial Application', title: 'Finance Tracker' }
            ],
            other: [
                { repo: 'Yggdrasoft-Labs', name: 'Yggdrasoft Labs', title: 'Company Website' },
                { repo: 'Netsentinel', name: 'NetSentinel', title: 'Network Monitor' },
                { repo: 'basic_calculator', name: 'Basic Calculator', title: 'Web Calculator' },
                { repo: 'Leetcode-solutions', name: 'LeetCode Solutions', title: 'Coding Practice' }
            ]
        };

        const username = 'perashanid';

        const languageColors = {
            'JavaScript': '#f1e05a',
            'TypeScript': '#3178c6',
            'Python': '#3572A5',
            'HTML': '#e34c26',
            'CSS': '#563d7c',
            'Go': '#00ADD8',
            'Java': '#b07219',
            'C++': '#f34b7d',
            'Ruby': '#701516',
            'PHP': '#4F5D95'
        };

        async function fetchRepoData(repo) {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}`);
                if (!response.ok) throw new Error('Failed to fetch');
                return await response.json();
            } catch (error) {
                console.error(`Error fetching ${repo}:`, error);
                return null;
            }
        }

        function createProjectCard(data, projectTitle) {
            if (!data) return '';
            
            const languageColor = languageColors[data.language] || '#8b949e';
            
            return `
                <div class="project-wrapper">
                    <div class="project-title">${projectTitle}</div>
                    <div class="project-card" onclick="window.open('${data.html_url}', '_blank')">
                        <div class="project-header">
                            <span class="repo-icon">📁</span>
                            <div class="project-name">${data.name}</div>
                        </div>
                        <div class="project-description">
                            ${data.description || 'No description available'}
                        </div>
                        <div class="project-meta">
                            ${data.language ? `
                            <div class="language">
                                <span class="language-dot" style="background-color: ${languageColor}"></span>
                                <span>${data.language}</span>
                            </div>
                            ` : ''}
                            <div class="stat">
                                <span class="stat-icon">⭐</span>
                                <span>${data.stargazers_count}</span>
                            </div>
                            ${data.forks_count > 0 ? `
                            <div class="stat">
                                <span class="stat-icon">🔱</span>
                                <span>${data.forks_count}</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadProjects() {
            const container = document.getElementById('projects-container');
            const loading = document.getElementById('loading');
            
            const categories = [
                { key: 'fullstack', title: 'Full Stack Applications' },
                { key: 'ai', title: 'AI & Machine Learning' },
                { key: 'dashboards', title: 'Dashboards & Analytics' },
                { key: 'other', title: 'Other Notable Projects' }
            ];

            let html = '';

            for (const category of categories) {
                const categoryProjects = projects[category.key];
                const projectsData = await Promise.all(
                    categoryProjects.map(p => fetchRepoData(p.repo))
                );

                html += `
                    <div class="category">
                        <h2 class="category-title">${category.title}</h2>
                        <div class="projects-grid">
                            ${projectsData.map((data, index) => 
                                createProjectCard(data, categoryProjects[index].title)
                            ).join('')}
                        </div>
                    </div>
                `;
            }

            loading.style.display = 'none';
            container.innerHTML = html;
        }

        loadProjects();
    </script>
</body>
</html>
